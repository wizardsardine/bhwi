name: Emulator CI

on:
  push:
    branches:
      - main
      - feat/nix-emulator-ci
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_TEST_THREADS: "1"
  XDG_CACHE_HOME: ${{ github.workspace }}/.cache

jobs:
  nix-flake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - name: Show flake outputs
        run: nix flake show --allow-import-from-derivation
      - name: Build script check
        run: nix build .#checks.x86_64-linux.emulator-scripts
      - name: Run HWI parity tests
        run: |
          ref="$(nix build --no-link --print-out-paths .#hwi-reference-bhwi)"
          nix develop -c cargo build -p bhwi-cli --bin hwi
          REFERENCE_HWI_BIN="$ref/bin/hwi-reference-bhwi" HWI_BIN="$PWD/target/debug/hwi" \
            nix develop -c cargo test -p bhwi-e2e-hwi-parity

  bitbox-e2e:
    needs: nix-flake
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - name: Start BitBox02 simulator
        run: |
          nix run .#bitbox > bitbox.log 2>&1 &
          echo $! > bitbox.pid
          tail -n +1 -F bitbox.log &
          echo $! > bitbox-tail.pid
          bash nix/scripts/wait-for-port.sh localhost 15423 600 "$(cat bitbox.pid)" || {
            bash nix/scripts/emit-gh-error-log.sh "BitBox startup log" bitbox.log
            cat bitbox.log || true
            exit 1
          }
          kill "$(cat bitbox-tail.pid)" || true
      - name: Run BitBox e2e
        run: |
          set -o pipefail
          nix develop .#bitbox -c cargo test -p bhwi-e2e-bitbox -- --test-threads=1 2>&1 | tee bitbox-e2e.log || {
            bash nix/scripts/emit-gh-error-log.sh "BitBox e2e log" bitbox-e2e.log
            cat bitbox-e2e.log || true
            exit 1
          }
      - name: Build bhwi CLI
        run: nix develop .#bitbox -c cargo build -p bhwi-cli
      - name: Run BitBox CLI e2e
        # Runs after the package e2e, which seeds the simulator's mnemonic (the CLI has no
        # restore command). The CLI reaches the simulator over TCP via the emulator path.
        run: |
          set -o pipefail
          BHWI_BIN="$PWD/target/debug/bhwi" nix develop .#bitbox -c cargo test -p bhwi-e2e-cli bitbox -- --test-threads=1 2>&1 | tee bitbox-cli-e2e.log || {
            bash nix/scripts/emit-gh-error-log.sh "BitBox CLI e2e log" bitbox-cli-e2e.log
            cat bitbox-cli-e2e.log || true
            exit 1
          }
      - name: Run HWI parity tests
        run: |
          set -o pipefail
          nix run .#hwi-parity-bitbox -- -- --test-threads=1 2>&1 | tee bitbox-hwi-parity.log || {
            bash nix/scripts/emit-gh-error-log.sh "BitBox HWI parity log" bitbox-hwi-parity.log
            cat bitbox-hwi-parity.log || true
            exit 1
          }
      - name: Stop BitBox simulator before upstream gate
        run: bash nix/scripts/stop-emulator.sh bitbox.pid tcp localhost 15423 60
      - name: Run upstream HWI BitBox02 suite
        run: timeout 45m nix run .#hwi-upstream-bitbox
      - name: Stop BitBox simulator
        if: always()
        run: bash nix/scripts/stop-emulator.sh bitbox.pid tcp localhost 15423 60

  coldcard-e2e:
    needs: nix-flake
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: actions/cache@v4
        with:
          path: ${{ env.XDG_CACHE_HOME }}/bhwi/coldcard
          key: coldcard-${{ runner.os }}-${{ hashFiles('flake.lock', 'flake.nix', 'nix/scripts/start-coldcard.sh') }}
          restore-keys: |
            coldcard-${{ runner.os }}-
      - name: Start Coldcard simulator
        run: |
          nix run .#coldcard > coldcard.log 2>&1 &
          echo $! > coldcard.pid
          tail -n +1 -F coldcard.log &
          echo $! > coldcard-tail.pid
          bash nix/scripts/wait-for-socket.sh /tmp/ckcc-simulator.sock 1800 "$(cat coldcard.pid)" || {
            bash nix/scripts/emit-gh-error-log.sh "Coldcard startup log" coldcard.log
            cat coldcard.log || true
            exit 1
          }
          kill "$(cat coldcard-tail.pid)" || true
      - name: Run HWI parity tests
        run: |
          set -o pipefail
          nix run .#hwi-parity-coldcard -- -- --test-threads=1 2>&1 | tee coldcard-hwi-parity.log || {
            bash nix/scripts/emit-gh-error-log.sh "Coldcard HWI parity log" coldcard-hwi-parity.log
            cat coldcard-hwi-parity.log || true
            exit 1
          }
      - name: Run Coldcard CLI e2e
        run: |
          set -o pipefail
          BHWI_BIN="$PWD/target/debug/bhwi" nix develop .#coldcard -c cargo test -p bhwi-e2e-cli coldcard -- --test-threads=1 2>&1 | tee coldcard-cli-e2e.log || {
            bash nix/scripts/emit-gh-error-log.sh "Coldcard CLI e2e log" coldcard-cli-e2e.log
            cat coldcard-cli-e2e.log || true
            exit 1
          }
      - name: Run Coldcard e2e
        run: |
          set -o pipefail
          nix develop .#coldcard -c cargo test -p bhwi-e2e-coldcard -- --test-threads=1 2>&1 | tee coldcard-e2e.log || {
            bash nix/scripts/emit-gh-error-log.sh "Coldcard e2e log" coldcard-e2e.log
            cat coldcard-e2e.log || true
            exit 1
          }
      - name: Stop Coldcard simulator before upstream gate
        run: bash nix/scripts/stop-emulator.sh coldcard.pid socket /tmp/ckcc-simulator.sock 60
      - name: Run upstream HWI Coldcard suite
        run: timeout 90m nix run .#hwi-upstream-coldcard
      - name: Stop Coldcard simulator
        if: always()
        run: bash nix/scripts/stop-emulator.sh coldcard.pid socket /tmp/ckcc-simulator.sock 60

  ledger-e2e:
    needs: nix-flake
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: actions/cache@v4
        with:
          path: ${{ env.XDG_CACHE_HOME }}/bhwi/ledger
          key: ledger-${{ runner.os }}-${{ hashFiles('flake.lock', 'flake.nix', 'nix/speculos.nix', 'nix/scripts/build-ledger-app.sh', 'nix/scripts/start-ledger.sh') }}
          restore-keys: |
            ledger-${{ runner.os }}-
      - name: Start Ledger Speculos
        run: |
          rm -f ledger.pid
          setsid bash -c 'echo "$$" > ledger.pid; exec nix run .#ledger' > ledger.log 2>&1 &
          for _ in {1..100}; do
            [[ -s ledger.pid ]] && break
            sleep 0.1
          done
          test -s ledger.pid
          tail -n +1 -F ledger.log &
          echo $! > ledger-tail.pid
          bash nix/scripts/wait-for-port.sh localhost 9999 1800 "$(cat ledger.pid)" || {
            bash nix/scripts/emit-gh-error-log.sh "Ledger startup log" ledger.log
            cat ledger.log || true
            exit 1
          }
          bash nix/scripts/wait-for-port.sh localhost 5000 300 "$(cat ledger.pid)" || {
            bash nix/scripts/emit-gh-error-log.sh "Ledger startup log" ledger.log
            cat ledger.log || true
            exit 1
          }
          kill "$(cat ledger-tail.pid)" || true
      - name: Run HWI parity tests
        run: |
          set -o pipefail
          nix run .#hwi-parity-ledger -- -- --test-threads=1 2>&1 | tee ledger-hwi-parity.log || {
            bash nix/scripts/emit-gh-error-log.sh "Ledger HWI parity log" ledger-hwi-parity.log
            cat ledger-hwi-parity.log || true
            exit 1
          }
      - name: Restart Ledger Speculos after HWI parity tests
        run: |
          bash nix/scripts/stop-emulator.sh ledger.pid tcp localhost 9999 60
          rm -f ledger.pid
          setsid bash -c 'echo "$$" > ledger.pid; exec nix run .#ledger' > ledger.log 2>&1 &
          for _ in {1..100}; do
            [[ -s ledger.pid ]] && break
            sleep 0.1
          done
          test -s ledger.pid
          tail -n +1 -F ledger.log &
          echo $! > ledger-tail.pid
          bash nix/scripts/wait-for-port.sh localhost 9999 1800 "$(cat ledger.pid)" || {
            bash nix/scripts/emit-gh-error-log.sh "Ledger restart log" ledger.log
            cat ledger.log || true
            exit 1
          }
          bash nix/scripts/wait-for-port.sh localhost 5000 300 "$(cat ledger.pid)" || {
            bash nix/scripts/emit-gh-error-log.sh "Ledger restart log" ledger.log
            cat ledger.log || true
            exit 1
          }
          kill "$(cat ledger-tail.pid)" || true
      - name: Run Ledger CLI e2e except PSBT signing
        run: |
          set -o pipefail
          BHWI_BIN="$PWD/target/debug/bhwi" nix develop .#ledger -c cargo test -p bhwi-e2e-cli ledger -- --skip ledger_sign_psbt --test-threads=1 2>&1 | tee ledger-cli-e2e.log || {
            bash nix/scripts/emit-gh-error-log.sh "Ledger CLI e2e log" ledger-cli-e2e.log
            cat ledger-cli-e2e.log || true
            exit 1
          }
      - name: Restart Ledger Speculos before PSBT CLI e2e
        run: |
          bash nix/scripts/stop-emulator.sh ledger.pid tcp localhost 9999 60
          rm -f ledger.pid
          setsid bash -c 'echo "$$" > ledger.pid; exec nix run .#ledger' > ledger.log 2>&1 &
          for _ in {1..100}; do
            [[ -s ledger.pid ]] && break
            sleep 0.1
          done
          test -s ledger.pid
          tail -n +1 -F ledger.log &
          echo $! > ledger-tail.pid
          bash nix/scripts/wait-for-port.sh localhost 9999 1800 "$(cat ledger.pid)" || {
            bash nix/scripts/emit-gh-error-log.sh "Ledger restart log" ledger.log
            cat ledger.log || true
            exit 1
          }
          bash nix/scripts/wait-for-port.sh localhost 5000 300 "$(cat ledger.pid)" || {
            bash nix/scripts/emit-gh-error-log.sh "Ledger restart log" ledger.log
            cat ledger.log || true
            exit 1
          }
          kill "$(cat ledger-tail.pid)" || true
      - name: Run Ledger PSBT CLI e2e
        run: |
          set -o pipefail
          BHWI_BIN="$PWD/target/debug/bhwi" nix develop .#ledger -c cargo test -p bhwi-e2e-cli ledger_sign_psbt -- --test-threads=1 2>&1 | tee ledger-cli-psbt-e2e.log || {
            bash nix/scripts/emit-gh-error-log.sh "Ledger PSBT CLI e2e log" ledger-cli-psbt-e2e.log
            cat ledger-cli-psbt-e2e.log || true
            exit 1
          }
      - name: Restart Ledger Speculos before Ledger e2e
        run: |
          bash nix/scripts/stop-emulator.sh ledger.pid tcp localhost 9999 60
          rm -f ledger.pid
          setsid bash -c 'echo "$$" > ledger.pid; exec nix run .#ledger' > ledger.log 2>&1 &
          for _ in {1..100}; do
            [[ -s ledger.pid ]] && break
            sleep 0.1
          done
          test -s ledger.pid
          tail -n +1 -F ledger.log &
          echo $! > ledger-tail.pid
          bash nix/scripts/wait-for-port.sh localhost 9999 1800 "$(cat ledger.pid)" || {
            bash nix/scripts/emit-gh-error-log.sh "Ledger restart log" ledger.log
            cat ledger.log || true
            exit 1
          }
          bash nix/scripts/wait-for-port.sh localhost 5000 300 "$(cat ledger.pid)" || {
            bash nix/scripts/emit-gh-error-log.sh "Ledger restart log" ledger.log
            cat ledger.log || true
            exit 1
          }
          kill "$(cat ledger-tail.pid)" || true
      - name: Run Ledger e2e except PSBT signing
        run: |
          set -o pipefail
          nix develop .#ledger -c cargo test -p bhwi-e2e-ledger -- --skip can_sign_psbt --test-threads=1 2>&1 | tee ledger-e2e.log || {
            bash nix/scripts/emit-gh-error-log.sh "Ledger e2e log" ledger-e2e.log
            cat ledger-e2e.log || true
            exit 1
          }
      - name: Restart Ledger Speculos before PSBT e2e
        run: |
          bash nix/scripts/stop-emulator.sh ledger.pid tcp localhost 9999 60
          rm -f ledger.pid
          setsid bash -c 'echo "$$" > ledger.pid; exec nix run .#ledger' > ledger.log 2>&1 &
          for _ in {1..100}; do
            [[ -s ledger.pid ]] && break
            sleep 0.1
          done
          test -s ledger.pid
          tail -n +1 -F ledger.log &
          echo $! > ledger-tail.pid
          bash nix/scripts/wait-for-port.sh localhost 9999 1800 "$(cat ledger.pid)" || {
            bash nix/scripts/emit-gh-error-log.sh "Ledger restart log" ledger.log
            cat ledger.log || true
            exit 1
          }
          bash nix/scripts/wait-for-port.sh localhost 5000 300 "$(cat ledger.pid)" || {
            bash nix/scripts/emit-gh-error-log.sh "Ledger restart log" ledger.log
            cat ledger.log || true
            exit 1
          }
          kill "$(cat ledger-tail.pid)" || true
      - name: Run Ledger PSBT e2e
        run: |
          set -o pipefail
          nix develop .#ledger -c cargo test -p bhwi-e2e-ledger can_sign_psbt -- --test-threads=1 2>&1 | tee ledger-psbt-e2e.log || {
            bash nix/scripts/emit-gh-error-log.sh "Ledger PSBT e2e log" ledger-psbt-e2e.log
            cat ledger-psbt-e2e.log || true
            exit 1
          }
      - name: Stop Ledger Speculos before upstream gate
        run: bash nix/scripts/stop-emulator.sh ledger.pid tcp localhost 9999 60
      - name: Run upstream HWI Ledger suite
        run: timeout 90m nix run .#hwi-upstream-ledger
      - name: Stop Ledger Speculos
        if: always()
        run: bash nix/scripts/stop-emulator.sh ledger.pid tcp localhost 9999 60

  jade-e2e:
    needs: nix-flake
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: actions/cache@v4
        with:
          path: ${{ env.XDG_CACHE_HOME }}/bhwi/jade
          key: jade-${{ runner.os }}-${{ hashFiles('flake.lock', 'flake.nix', 'nix/scripts/start-jade.sh', 'nix/scripts/start-jade-pinserver.sh', 'nix/scripts/init-jade.sh') }}
          restore-keys: |
            jade-${{ runner.os }}-
      - name: Start Jade pinserver
        run: |
          nix run .#jade-pinserver > jade-pinserver.log 2>&1 &
          echo $! > jade-pinserver.pid
          tail -n +1 -F jade-pinserver.log &
          echo $! > jade-pinserver-tail.pid
          bash nix/scripts/wait-for-port.sh localhost 8096 1800 "$(cat jade-pinserver.pid)" || {
            bash nix/scripts/emit-gh-error-log.sh "Jade pinserver startup log" jade-pinserver.log
            cat jade-pinserver.log || true
            exit 1
          }
          kill "$(cat jade-pinserver-tail.pid)" || true
      - name: Start Jade QEMU
        run: |
          nix run .#jade > jade.log 2>&1 &
          echo $! > jade.pid
          tail -n +1 -F jade.log &
          echo $! > jade-tail.pid
          bash nix/scripts/wait-for-port.sh localhost 30121 1800 "$(cat jade.pid)" || {
            bash nix/scripts/emit-gh-error-log.sh "Jade QEMU startup log" jade.log
            cat jade.log || true
            exit 1
          }
          kill "$(cat jade-tail.pid)" || true
      - name: Initialize Jade
        run: |
          nix run .#jade-init > jade-init.log 2>&1 || {
            bash nix/scripts/emit-gh-error-log.sh "Jade init log" jade-init.log
            cat jade-init.log || true
            exit 1
          }
      - name: Run HWI parity tests
        run: |
          set -o pipefail
          nix run .#hwi-parity-jade -- -- --test-threads=1 2>&1 | tee jade-hwi-parity.log || {
            bash nix/scripts/emit-gh-error-log.sh "Jade HWI parity log" jade-hwi-parity.log
            cat jade-hwi-parity.log || true
            exit 1
          }
      - name: Run Jade CLI e2e
        run: |
          set -o pipefail
          BHWI_BIN="$PWD/target/debug/bhwi" nix develop .#jade -c cargo test -p bhwi-e2e-cli jade -- --test-threads=1 2>&1 | tee jade-cli-e2e.log || {
            bash nix/scripts/emit-gh-error-log.sh "Jade CLI e2e log" jade-cli-e2e.log
            cat jade-cli-e2e.log || true
            exit 1
          }
      - name: Run Jade e2e
        run: |
          set -o pipefail
          nix develop .#jade -c cargo test -p bhwi-e2e-jade -- --test-threads=1 2>&1 | tee jade-e2e.log || {
            bash nix/scripts/emit-gh-error-log.sh "Jade e2e log" jade-e2e.log
            cat jade-e2e.log || true
            exit 1
          }
      - name: Stop Jade services before upstream gate
        run: |
          bash nix/scripts/stop-emulator.sh jade.pid tcp localhost 30121 60
          bash nix/scripts/stop-emulator.sh jade-pinserver.pid tcp localhost 8096 60
      - name: Run upstream HWI Jade suite
        run: timeout 120m nix run .#hwi-upstream-jade
      - name: Stop Jade services
        if: always()
        run: |
          bash nix/scripts/stop-emulator.sh jade.pid tcp localhost 30121 60
          bash nix/scripts/stop-emulator.sh jade-pinserver.pid tcp localhost 8096 60
